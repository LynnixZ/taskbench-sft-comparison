# MODEL-comparison config: ONE robust LoRA(r=16) recipe applied to many models,
# to validate that SFT on TaskBench improves over the base model (not to tune).
# Chosen for STABILITY across Llama-2/3, Mistral, Vicuna, Qwen2.5/Qwen3 (all are
# Llama-style, so the same target_modules apply). Override the model per run with
# --set model.name=... (scripts/sweep_models.sh does this).

project_name: taskbench-sft-format-comparison
output_dir: outputs

data:
  raw_dir: data/raw
  domains: [data_huggingface, data_multimedia, data_dailylifeapis]
  include_topologies: [single, chain]
  require_catalog_faithful_gold: true

split:
  seed: 42
  out_dir: artifacts/splits          # shared sample IDs across all models (fair)

tokenization:
  max_seq_length: 3072               # per-model token-report confirms coverage
  drop_truncated_targets: true
  report_path: artifacts/token_length_report.json   # overridden per model

model:
  name: Qwen/Qwen3-8B                 # overridden per model by the sweep
  trust_remote_code: true            # some tokenizers (Qwen) need it
  use_chat_template: true            # falls back to plain text for base models

# ---- The robust, stability-first SFT recipe (LoRA r=16) ----
training:
  method: qlora                      # 4-bit; fits every model here on one 24GB+ GPU
  epochs: 3
  learning_rate: 0.0002              # 2e-4: LoRA sweet spot, stable across models
  weight_decay: 0.0                  # LoRA params: no decay
  warmup_ratio: 0.03                 # warmup matters for early-step stability
  scheduler: cosine
  optim: paged_adamw_8bit            # stable + memory-friendly for QLoRA
  per_device_train_batch_size: 1     # 24GB-safe; raise on big GPUs
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16    # effective batch 16 (stable gradients)
  gradient_checkpointing: true
  bf16: true                         # bf16, NOT fp16 -> no overflow/NaN
  fp16: false
  max_grad_norm: 1.0                 # gradient clipping -> prevents explosions
  seed: 42
  logging_steps: 10
  eval_steps: 200
  save_steps: 200
  save_total_limit: 2
  max_steps: null

lora:
  r: 16
  alpha: 32                          # alpha = 2*r
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

checkpoint_selection:
  node_f1: 0.4
  edge_f1: 0.3
  sequence_exact_match: 0.2
  parse_valid_rate: 0.1

inference:
  do_sample: false
  temperature: 0.0
  num_beams: 1
  full_json_max_new_tokens: 1024
  trajectory_max_new_tokens: 256

eval:
  group_by: [domain, topology, chain_length]
  compute_rouge: true
  compute_bertscore: false
  max_val_eval_samples: 64

wandb:
  enabled: true
  project: taskbench-sft-models
  group: model-comparison
  mode: online
  log_model: false
  base_tags: [taskbench, node-chain, model-comparison]
